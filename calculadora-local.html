<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calculadora clínica basada en evidencia para la prescripción de plantillas ortopédicas y el análisis de pie plano (flexible y rígido)." />
    <title>Calculadora de Plantillas Ortopédicas | Pie Plano</title>
    <!-- React, ReactDOM, Babel, and Google Fonts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* ── VARIABLES GLOBALES ── */
      :root {
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-heading: 'Outfit', system-ui, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

        --bg-body: #f8fafc;
        --bg-card: #ffffff;
        --bg-header: #0f172a;
        --bg-nav-active: #f8fafc;
        
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --text-on-header: #f8fafc;
        --text-header-muted: #94a3b8;
        
        --accent: #4f46e5;
        --accent-hover: #4338ca;
        
        --border-color: #e2e8f0;
        --border-focus: #6366f1;
        
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.06), 0 4px 6px -2px rgba(0, 0, 0, 0.03);

        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        
        --bg-badge-leve: #dcfce7;
        --text-badge-leve: #15803d;
        --bg-badge-moderado: #fef3c7;
        --text-badge-moderado: #b45309;
        --bg-badge-severo: #ffe4e6;
        --text-badge-severo: #be123c;
        
        --bg-note: #fffbeb;
        --border-note: #fef08a;
        --text-note: #78350f;
        --text-note-darker: #713f12;

        --bg-item-rx: #f8fafc;
        --border-item-rx: #e2e8f0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-body: #090d16;
          --bg-card: #131b2e;
          --bg-header: #070a12;
          --bg-nav-active: #090d16;
          
          --text-primary: #f8fafc;
          --text-secondary: #94a3b8;
          --text-muted: #64748b;
          --text-on-header: #f8fafc;
          --text-header-muted: #64748b;
          
          --accent: #6366f1;
          --accent-hover: #818cf8;
          
          --border-color: #1e293b;
          --border-focus: #818cf8;
          
          --glass-bg: rgba(19, 27, 46, 0.7);
          --glass-border: rgba(255, 255, 255, 0.05);
          --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
          
          --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.2);
          --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
          --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.25);

          --bg-badge-leve: rgba(16, 185, 129, 0.15);
          --text-badge-leve: #34d399;
          --bg-badge-moderado: rgba(245, 158, 11, 0.15);
          --text-badge-moderado: #fbbf24;
          --bg-badge-severo: rgba(239, 68, 68, 0.15);
          --text-badge-severo: #f87171;
          
          --bg-note: rgba(251, 191, 36, 0.08);
          --border-note: rgba(251, 191, 36, 0.2);
          --text-note: #fcd34d;
          --text-note-darker: #f59e0b;

          --bg-item-rx: #1a243d;
          --border-item-rx: #1e293b;
        }
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font-sans);
        background-color: var(--bg-body);
        color: var(--text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      #root { min-height: 100vh; display: flex; flex-direction: column; }

      .app { display: flex; flex-direction: column; background-color: var(--bg-body); min-height: 100vh; }

      /* Header */
      header {
        background: radial-gradient(circle at top right, #1e1b4b, var(--bg-header));
        color: var(--text-on-header);
        padding: 2.5rem 2rem 0;
        border-bottom: 1px solid var(--border-color);
        box-shadow: var(--shadow-sm);
        text-align: center;
      }
      header h1 {
        font-family: var(--font-heading);
        font-size: 2.25rem;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, #a5b4fc, #e0e7ff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 1rem;
        color: var(--text-header-muted);
        max-width: 600px;
        margin: 0 auto 1.5rem;
      }
      nav { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
      nav button {
        padding: 0.75rem 1.5rem;
        background: transparent;
        border: none;
        color: var(--text-header-muted);
        font-family: var(--font-sans);
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: 12px 12px 0 0;
        transition: all 0.2s ease;
        position: relative;
      }
      nav button:hover { color: var(--text-on-header); background-color: rgba(255, 255, 255, 0.05); }
      nav button.active { background-color: var(--bg-body); color: var(--accent); font-weight: 600; }
      nav button.active::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
        background-color: var(--accent); border-radius: 3px 3px 0 0;
      }

      /* Main Grid */
      .main-grid {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 2rem;
        padding: 2.5rem 2rem;
        max-width: 1300px;
        margin: 0 auto;
        width: 100%;
        align-items: start;
      }
      @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; padding: 1.5rem 1rem; } }

      /* Cards */
      .form-section, .result-section, .registro-card, .padres-card, .guia-section details {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: var(--shadow-md);
        transition: all 0.3s ease;
      }
      @supports (backdrop-filter: blur(10px)) {
        .form-section, .result-section, .registro-card, .padres-card {
          background-color: var(--glass-bg);
          border: 1px solid var(--glass-border);
          backdrop-filter: blur(12px);
          box-shadow: var(--glass-shadow);
        }
      }
      .form-section:hover, .result-section:hover, .registro-card:hover { box-shadow: var(--shadow-lg); }

      .form-section h2, .result-section h2, .registro-section h2, .guia-section h2, .padres-section h2 {
        font-family: var(--font-heading);
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }

      /* Form */
      form label { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
      form input, form select {
        padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 10px;
        font-family: var(--font-sans); font-size: 0.95rem; color: var(--text-primary);
        background-color: var(--bg-body); transition: all 0.2s ease;
      }
      form input:focus, form select:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); background-color: var(--bg-card); }
      fieldset { border: 1px solid var(--border-color); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; background-color: rgba(0, 0, 0, 0.02); }
      legend { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); padding: 0 0.5rem; }
      .checkbox-label { flex-direction: row !important; align-items: center; gap: 0.75rem !important; font-weight: 400 !important; margin-bottom: 0.75rem !important; cursor: pointer; color: var(--text-secondary); }
      .checkbox-label input[type="checkbox"] { width: 1.15rem; height: 1.15rem; accent-color: var(--accent); cursor: pointer; }

      .btn-primary {
        width: 100%; padding: 0.85rem; background-color: var(--accent); color: white; border: none; border-radius: 12px;
        font-family: var(--font-sans); font-size: 1rem; font-weight: 600; cursor: pointer;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); transition: all 0.2s ease;
      }
      .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); }

      .error {
        color: var(--color-error); font-size: 0.9rem; background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1.25rem; font-weight: 500; animation: shake 0.4s ease;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }

      /* Results */
      .result-section { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      
      .no-indicacion { border-left: 4px solid var(--color-success); padding-left: 1.5rem; }
      .no-indicacion h2 { color: var(--color-success); font-size: 1.25rem; margin-bottom: 0.75rem; }
      .no-indicacion .mensaje { color: var(--text-primary); margin-bottom: 1.25rem; }
      .no-indicacion ul { padding-left: 1.5rem; color: var(--text-secondary); }
      .no-indicacion li { margin-bottom: 0.5rem; }

      .rx-header { border-bottom: 1px solid var(--border-color); padding-bottom: 1.25rem; margin-bottom: 1.5rem; }
      .rx-header h2 { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.5rem; }
      .rx-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
      .rx-meta span:not(.badge) { background-color: var(--bg-body); color: var(--text-secondary); padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; border: 1px solid var(--border-color); }

      .badge { padding: 0.35rem 0.85rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; text-transform: capitalize; }
      .badge-leve { background-color: var(--bg-badge-leve); color: var(--text-badge-leve); }
      .badge-moderado { background-color: var(--bg-badge-moderado); color: var(--text-badge-moderado); }
      .badge-severo { background-color: var(--bg-badge-severo); color: var(--text-badge-severo); }

      .rx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
      .rx-item { display: flex; flex-direction: column; justify-content: space-between; padding: 0.85rem 1rem; background-color: var(--bg-item-rx); border-radius: 12px; border: 1px solid var(--border-item-rx); border-left: 4px solid var(--border-color); }
      .rx-highlight { background-color: rgba(99, 102, 241, 0.05); border-left-color: var(--accent); }
      .rx-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
      .rx-value { font-size: 0.95rem; color: var(--text-primary); font-weight: 700; }

      .notas { background-color: var(--bg-note); border: 1px solid var(--border-note); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
      .notas h3 { font-size: 0.95rem; color: var(--text-note-darker); margin-bottom: 0.5rem; }
      .notas ul { padding-left: 1.25rem; }
      .notas li { font-size: 0.9rem; color: var(--text-note); margin-bottom: 0.5rem; }

      details.fundamentacion { margin-bottom: 1.5rem; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; background-color: var(--bg-card); }
      details.fundamentacion summary { padding: 0.85rem 1.25rem; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); background-color: var(--bg-body); }
      details.fundamentacion ul { padding: 1rem 1.5rem; list-style: square; color: var(--text-secondary); }
      details.fundamentacion li { font-size: 0.85rem; margin-bottom: 0.5rem; }

      .rx-actions { display: flex; align-items: center; gap: 1.25rem; border-top: 1px solid var(--border-color); padding-top: 1.25rem; }
      .btn-save { padding: 0.75rem 1.75rem; background-color: #10b981; color: white; border: none; border-radius: 10px; font-family: var(--font-sans); font-size: 0.95rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
      .btn-save:hover { background-color: #059669; transform: translateY(-1px); }
      .saved-msg { font-size: 0.9rem; color: #10b981; font-weight: 600; }

      /* Registry */
      .registro-section { max-width: 900px; margin: 2rem auto; padding: 0 2rem; width: 100%; }
      .registro-list { display: flex; flex-direction: column; gap: 1rem; }
      .registro-card { border-left: 5px solid var(--accent); animation: fadeIn 0.3s ease; }
      .reg-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
      .reg-paciente { font-family: var(--font-heading); font-weight: 700; font-size: 1.15rem; color: var(--text-primary); }
      .reg-fecha { font-size: 0.85rem; color: var(--text-muted); margin-left: auto; }
      .btn-delete { background: none; border: none; color: var(--color-error); cursor: pointer; font-size: 1.1rem; padding: 0.25rem; line-height: 1; border-radius: 6px; }
      .btn-delete:hover { background-color: rgba(239, 68, 68, 0.1); transform: scale(1.1); }
      .reg-details { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.75rem; font-size: 0.85rem; color: var(--text-secondary); }
      .reg-details span { background-color: var(--bg-body); padding: 0.2rem 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); }
      .reg-tipo { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 0.75rem; }
      details.reg-full { border-top: 1px solid var(--border-color); padding-top: 0.75rem; margin-top: 0.5rem; }
      details.reg-full summary { cursor: pointer; font-size: 0.85rem; color: var(--text-muted); }
      .rx-grid.compact { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); margin-top: 0.75rem; }
      .nota-small { font-size: 0.85rem; color: var(--text-note); background-color: var(--bg-note); border: 1px solid var(--border-note); padding: 0.6rem 0.85rem; border-radius: 8px; }

      /* Clinical Guide */
      .guia-section { max-width: 900px; margin: 2rem auto; padding: 0 2rem; width: 100%; }
      .guia-section details { margin-bottom: 1rem; padding: 0; overflow: hidden; }
      .guia-section details summary { padding: 1.25rem 1.5rem; font-family: var(--font-heading); font-weight: 600; font-size: 1.1rem; color: var(--text-primary); cursor: pointer; background-color: var(--bg-card); }
      .guia-section details[open] summary { background-color: rgba(99, 102, 241, 0.05); color: var(--accent); border-bottom: 1px solid var(--border-color); }
      
      .table-wrapper { overflow-x: auto; width: 100%; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; text-align: left; }
      th { background-color: var(--bg-body); padding: 1rem 1.25rem; font-weight: 700; color: var(--text-primary); border-bottom: 2px solid var(--border-color); text-transform: uppercase; font-size: 0.75rem; }
      td { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color); color: var(--text-secondary); }
      tr:last-child td { border-bottom: none; }
      
      .guia-tests { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; padding: 1.5rem; }
      .test-card { background-color: var(--bg-body); border-radius: 12px; padding: 1.25rem; border: 1px solid var(--border-color); border-left: 4px solid var(--accent); }
      .test-card h4 { font-family: var(--font-heading); font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; font-weight: 700; }
      .test-card p { font-size: 0.85rem; color: var(--text-secondary); }

      /* Parents Section */
      .padres-section { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; width: 100%; }
      .padres-intro { color: var(--text-secondary); font-size: 1.05rem; margin-bottom: 2rem; }
      .padres-card h3 { font-family: var(--font-heading); font-size: 1.2rem; color: var(--accent); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); }
      .diagrams-row { display: flex; gap: 1.5rem; justify-content: space-around; flex-wrap: wrap; }
      .diagram-box { flex: 1; min-width: 200px; max-width: 280px; background-color: var(--bg-body); border-radius: 12px; padding: 1rem; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); }
      
      svg text { fill: var(--text-primary) !important; font-family: var(--font-sans); }
      svg text[fill="#2b6cb0"] { fill: #818cf8 !important; }
      svg text[fill="#c05621"] { fill: #f59e0b !important; }
      svg text[fill="#276749"] { fill: #34d399 !important; }
      svg text[fill="#718096"] { fill: var(--text-muted) !important; }
      svg text[fill="#4a5568"] { fill: var(--text-secondary) !important; }
      svg path[stroke="#2b6cb0"] { stroke: #818cf8 !important; }
      svg path[stroke="#c05621"] { stroke: #f59e0b !important; }
      svg path[stroke="#c07040"] { stroke: var(--border-color) !important; }
      svg path[fill="#fde8d0"] { fill: #e2e8f0 !important; }
      
      @media (prefers-color-scheme: dark) {
        svg path[fill="#fde8d0"] { fill: #334155 !important; }
        svg rect[fill="#c07040"] { fill: #475569 !important; }
        svg rect[fill="#fde8d0"] { fill: #1e293b !important; }
        svg path[fill="#fde8d0"] { fill: #1e293b !important; }
        svg path[fill="#bee3f8"] { fill: rgba(99, 102, 241, 0.2) !important; }
        svg path[fill="#c6f6d5"] { fill: rgba(16, 185, 129, 0.1) !important; }
      }

      .mejoria-wrap { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; align-items: start; }
      @media (max-width: 768px) { .mejoria-wrap { grid-template-columns: 1fr; } }
      .mejoria-lista { display: flex; flex-direction: column; gap: 0.75rem; }
      .mejoria-item { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.85rem 1rem; border-radius: 12px; font-size: 0.9rem; border-left: 4px solid var(--border-color); }
      .mejoria-item.green { background-color: var(--bg-badge-leve); border-left-color: var(--text-badge-leve); color: var(--text-badge-leve); }
      .mejoria-item.orange { background-color: var(--bg-badge-moderado); border-left-color: var(--text-badge-moderado); color: var(--text-badge-moderado); }
      .mejoria-item.blue { background-color: rgba(99, 102, 241, 0.1); border-left-color: var(--accent); color: var(--accent); }
      .mi-icon { font-weight: 700; font-size: 1.1rem; width: 20px; flex-shrink: 0; }

      .semaforo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
      @media (max-width: 768px) { .semaforo-grid { grid-template-columns: 1fr; } }
      .semaforo-card { border-radius: 14px; padding: 1.5rem; border: 1px solid var(--border-color); border-top: 5px solid transparent; box-shadow: var(--shadow-sm); }
      .semaforo-card.verde { background-color: var(--bg-badge-leve); border-top-color: var(--text-badge-leve); }
      .semaforo-card.amarillo { background-color: var(--bg-badge-moderado); border-top-color: var(--text-badge-moderado); }
      .semaforo-card.rojo { background-color: var(--bg-badge-severo); border-top-color: var(--text-badge-severo); }
      
      .semaforo-dot { width: 16px; height: 16px; border-radius: 50%; margin-bottom: 0.75rem; }
      .verde-dot { background-color: var(--text-badge-leve); }
      .amarillo-dot { background-color: var(--text-badge-moderado); }
      .rojo-dot { background-color: var(--text-badge-severo); }
      .semaforo-card h4 { font-family: var(--font-heading); font-size: 1.05rem; margin-bottom: 0.75rem; color: var(--text-primary); font-weight: 700; }
      .semaforo-card ul { padding-left: 1.25rem; font-size: 0.85rem; color: var(--text-secondary); }
      .semaforo-card li { margin-bottom: 0.5rem; }
      
      .plantilla-note { margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary); background-color: var(--bg-body); padding: 1rem 1.25rem; border-radius: 12px; border-left: 4px solid var(--accent); }

      /* Footer */

    <!-- CODE SCRIPT (Babel on the fly compiling JSX) -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      // ── PRESCRIPTION ENGINE LOGIC ──
      const GRADES = {
        LEVE: "leve",
        MODERADO: "moderado",
        SEVERO: "severo",
      };

      const AGE_GROUP = {
        MENOR_4: "menor_4",
        ESCOLAR_TEMPRANO: "escolar_temprano",
        ESCOLAR_TARDIO: "escolar_tardio",
        JUVENIL_ADULTO: "juvenil_adulto",
      };

      function getAgeGroup(age) {
        if (age < 2) return null;
        if (age < 4) return AGE_GROUP.MENOR_4;
        if (age < 8) return AGE_GROUP.ESCOLAR_TEMPRANO;
        if (age < 12) return AGE_GROUP.ESCOLAR_TARDIO;
        return AGE_GROUP.JUVENIL_ADULTO;
      }

      function generatePrescription({ talla, edad, grado, sintomas, flexible, dismetriaActiva, dismetriaPie, dismetriaValor }) {
        if (edad < 2) {
          return { error: "Edad mínima para prescripción: 2 años." };
        }

        // Under 4 years: no prescription if asymptomatic
        if (edad < 4 && !sintomas && !dismetriaActiva) {
          return {
            indicacion: false,
            mensaje:
              "No se indican plantillas en menores de 4 años (pie plano fisiológico en desarrollo).",
            recomendaciones: [
              "Estimular marcha descalza en superficies naturales (arena, pasto).",
              "Evitar calzado con suela rígida o soporte de arco prefabricado.",
              "Control anual para evaluar el desarrollo del arco plantar.",
            ],
          };
        }

        const rx = buildRx({ talla, edad, grado, sintomas, flexible, dismetriaActiva, dismetriaPie, dismetriaValor });
        
        if (!rx.indicacion) {
          return {
            indicacion: false,
            mensaje:
              "No se indican plantillas en menores de 4 años (pie plano fisiológico en desarrollo).",
            recomendaciones: [
              "Estimular marcha descalza en superficies naturales (arena, pasto).",
              "Evitar calzado con suela rígida o soporte de arco prefabricado.",
              "Control anual para evaluar el desarrollo del arco plantar.",
            ],
          };
        }

        return rx;
      }

      function buildRx({ talla, edad, grado, sintomas, flexible, dismetriaActiva, dismetriaPie, dismetriaValor }) {
        const rx = {
          indicacion: true,
          tipo: "",
          arcoSoporte: "",
          taconeraAltura: "",
          cunaRearfoot: "",
          cunaForefoot: "0 mm",
          flandeMedal: "",
          padMetatarsal: false,
          material: "",
          longitud: "Longitud completa",
          notes: [],
          notas: [],
          controles: "Control a los 3 meses",
          fundamentacion: [],
          alzaTalon: dismetriaActiva ? { pie: dismetriaPie, valor: dismetriaValor } : null,
        };
        rx.notes = rx.notas; // alias just in case

        if (dismetriaActiva) {
          rx.notas.push(`Dismetría de extremidades: Compensar con alza de talón de ${dismetriaValor} mm en la plantilla del pie ${dismetriaPie === "izquierdo" ? "Izquierdo" : "Derecho"}.`);
        }

        // Rigid non-flexible flat foot -> accommodative only, refer
        if (!flexible) {
          rx.tipo = "Plantilla acomodativa (pie plano rígido)";
          rx.arcoSoporte = "10 mm";
          rx.taconeraAltura = "25 mm, copa ancha";
          rx.cunaRearfoot = "0 mm";
          rx.cunaForefoot = "0 mm";
          rx.flandeMedal = "Medial y lateral altos para contención y estabilización";
          rx.material = "EVA blando con cubierta de neopreno";
          rx.notas.push(
            "Alerta: El pie plano rígido (no flexible) es una condición estructural fija.",
            "La plantilla debe ser puramente acomodativa para evitar lesiones en tejidos blandos por presión.",
            "Se requiere derivación prioritaria a traumatología o podología clínica para descartar coalición tarsal, astrágalo vertical u otras patologías rígidas."
          );
          rx.controles = "Control a los 6 meses";
          rx.fundamentacion.push(
            "PTTD Stage III / Rigid flatfoot protocol: accommodative orthosis only (Michigan Foot Doctors)",
            "Delphi Consensus: corrective posting is contraindicated in rigid foot deformities (PMC4282733)"
          );
          return rx;
        }

        // Botón metatarsal: 4 mm retrocapital if symptomatic and age >= 8
        if (sintomas && edad >= 8) {
          rx.padMetatarsal = true;
          rx.notas.push("Botón metatarsal retrocapital de 4 mm indicado para descargar las cabezas metatarsianas.");
        }

        // Rule 1: Talla >= 41 (independent of age)
        if (talla >= 41) {
          rx.tipo = "Plantilla correctora de soporte firme (talla >= 41)";
          rx.arcoSoporte = "18 mm";
          rx.cunaRearfoot = "6 mm";
          rx.taconeraAltura = "18 mm";
          rx.flandeMedal = "Medial y lateral elevados";
          rx.material = "Polipropileno con cubierta suave";
          rx.notas.push(
            "Paciente con pie sobre talla 41: se prescribe arco medial de 18 mm y cuña de retropié de 6 mm para compensar la mayor longitud del pie.",
            "Se mantiene la relación biomecánica 1:3 entre cuña y arco medial."
          );
          rx.fundamentacion.push(
            "Escalamiento biomecánico: a mayor longitud del pie (talla >= 41), se requiere mayor flecha de arco (18 mm) y cuña (6 mm) para mantener la misma palanca correctora y dosificación angular.",
            "Consenso Delphi: el posteo retropié varo y soporte longitudinal controlan el colapso del arco en adultos (PMC4282733)."
          );
          return rx;
        }

        // Rule 2: Age groups (for talla < 41)
        const ageGroup = getAgeGroup(edad);

        if (ageGroup === AGE_GROUP.MENOR_4) {
          if (sintomas) {
            rx.tipo = "Plantilla de confort leve (menor de 4 años)";
            rx.arcoSoporte = "8 mm";
            rx.cunaRearfoot = "2 mm";
            rx.taconeraAltura = "10 mm, copa superficial";
            rx.flandeMedal = "Mínimo";
            rx.material = "EVA blando 10 mm (baja densidad, Shore 30)";
            rx.notas.push(
              "Menor de 4 años sintomático o padres muy insistentes: se prescribe soporte de confort leve.",
              "Se utiliza una cuña de retropié mínima (2 mm) y soporte de arco bajo (8 mm) para no interferir con el desarrollo fisiológico natural del pie."
            );
            rx.fundamentacion.push(
              "Revisión Cochrane: desaconseja el uso de plantillas rígidas correctivas en menores de 4 años.",
              "El uso de ortesis blandas de confort leve está indicado ante sintomatología evidente para reducir la fatiga muscular y tranquilizar a la familia (PMC9561439)."
            );
          } else {
            rx.indicacion = false;
          }
          return rx;
        }

        if (ageGroup === AGE_GROUP.ESCOLAR_TEMPRANO) {
          rx.tipo = "Plantilla correctora pediátrica (4 a 8 años)";
          rx.arcoSoporte = "12 mm";
          rx.cunaRearfoot = "4 mm";
          rx.taconeraAltura = "12 mm";
          rx.flandeMedal = "Estándar";
          rx.material = "EVA 10 mm doble densidad (base firme + cubierta suave)";
          rx.notas.push(
            "Notas del Profesor (4-8 años): arco medial de 12 mm y cuña medial de talón (retropié) de 4 mm.",
            "Relación cuña:arco respetada en proporción 1:3 para estabilizar el retropié."
          );
          rx.fundamentacion.push(
            "Desarrollo dinámico del arco: en el rango de 4 a 8 años, la cuña de 4 mm reduce el valgo del talón y facilita el desarrollo del arco longitudinal medial.",
            "Estudios clínicos pediátricos demuestran que las plantillas activas mejoran la alineación de la marcha en niños con pie plano sintomático (PMC9561439)."
          );
          return rx;
        }

        if (ageGroup === AGE_GROUP.ESCOLAR_TARDIO) {
          rx.tipo = "Plantilla correctora pediátrica (8 a 12 años)";
          rx.arcoSoporte = "15 mm";
          rx.cunaRearfoot = "5 mm";
          rx.taconeraAltura = "15 mm";
          rx.flandeMedal = "Medial elevado";
          rx.material = "EVA 10 mm doble densidad o resina semirígida";
          rx.notas.push(
            "Notas del Profesor (8-12 años): arco medial de 15 mm y cuña medial de talón (retropié) de 5 mm.",
            "Relación cuña:arco respetada en proporción 1:3."
          );
          rx.fundamentacion.push(
            "Osificación tarsal: en el rango de 8 a 12 años el pie es menos plástico. La cuña de 5 mm y soporte de 15 mm proveen la fuerza de reacción del suelo necesaria para el control del retropié.",
            "Consenso Delphi: el uso de cuña de retropié varo de 5 mm es efectivo para controlar la pronación y el talón valgo en escolares tardíos (PMC4282733)."
          );
          return rx;
        }

        // Rule 3: Age >= 12 and Talla < 41 (Juvenil/Adulto)
        if (grado === GRADES.LEVE) {
          rx.tipo = "Plantilla correctora semirígida (Grado Leve)";
          rx.arcoSoporte = "12 mm";
          rx.cunaRearfoot = "4 mm";
          rx.taconeraAltura = "15 mm";
          rx.flandeMedal = "Estándar";
          rx.material = "Polipropileno con cubierta suave";
          rx.notas.push(
            "Paciente mayor de 12 años con pie plano leve y talla < 41: se prescribe arco medial de 12 mm y cuña de retropié de 4 mm.",
            "Relación cuña:arco respetada en proporción 1:3."
          );
          rx.fundamentacion.push(
            "Control de pronación leve: soporte de 12 mm y cuña de 4 mm proveen estabilización básica sin sobrecorregir.",
            "CART algorithm decision tree: mild flatfoot corrective orthosis (PMC9566258)"
          );
        } else if (grado === GRADES.MODERADO) {
          rx.tipo = "Plantilla correctora semirígida a medida (Grado Moderado)";
          rx.arcoSoporte = "15 mm";
          rx.cunaRearfoot = "5 mm";
          rx.taconeraAltura = "20 mm";
          rx.flandeMedal = "Medial elevado";
          rx.material = "Polipropileno con cubierta suave";
          rx.notas.push(
            "Paciente mayor de 12 años con pie plano moderado y talla < 41: se prescribe arco medial de 15 mm y cuña de retropié de 5 mm.",
            "Relación cuña:arco respetada en proporción 1:3."
          );
          rx.fundamentacion.push(
            "Control intermedio: la cuña de 5 mm reduce el valgo del calcáneo y la tensión sobre el tendón del tibial posterior.",
            "Stage I/II PTTD orthotic design guidelines (ProLab Orthotics, 2024)"
          );
        } else {
          rx.tipo = "Plantilla correctora rígida a medida (Grado Severo)";
          rx.arcoSoporte = "18 mm";
          rx.cunaRearfoot = "6 mm";
          rx.taconeraAltura = "25 mm, copa profunda";
          rx.flandeMedal = "Flancos medial y lateral altos (control total)";
          rx.material = "Polipropileno rígido o resina reforzada";
          rx.notas.push(
            "Paciente mayor de 12 años con pie plano severo y talla < 41: se prescribe arco medial of 18 mm y cuña de retropié de 6 mm.",
            "Se requiere flanco medial y lateral elevados para contención y control de retropié valgo severo."
          );
          rx.fundamentacion.push(
            "Control rígido de deformidades severas: el uso de cuñas de 6 mm y soporte de arco de 18 mm es el estándar de oro para pie plano severo flexible (copa tipo UCBL).",
            "UCBL design criteria: deep heel cup and high medial/lateral flanges (FootFoot Care, 2024)"
          );
        }

        return rx;
      }

                    <text x="10" y="197" fontSize="4" fill="var(--text-muted)" opacity="0.6">Scale 20mm</text>
                  </svg>
                </div>
                <div className="diagram-side-box">
                  <h5>Pie Derecho</h5>
                  <svg viewBox="0 0 100 220" className="insole-svg">
                    <rect width="100" height="220" fill="url(#gridPattern)" />
                    {renderInsoleTop(false)}
                    <text x="50" y="215" textAnchor="middle" fontSize="6" fontWeight="bold">TALÓN</text>
                    <text x="50" y="12" textAnchor="middle" fontSize="6" fontWeight="bold">PUNTA</text>
                    <text x="27" y="110" textAnchor="middle" fontSize="5" fill="var(--accent)" transform="rotate(-90, 27, 110)">{archText}</text>
                    {hasMetatarsalPad && <text x="50" y="90" fontSize="5" fill="#d97706" fontWeight="bold" textAnchor="middle">Barra R.</text>}
                    {hasRearfootWedge && <text x="14" y="195" fontSize="5" fill="#ef4444" fontWeight="bold" textAnchor="end">Cuña V. ({cunaRearfootText}) →</text>}
                    {hasForefootWedge && <text x="12" y="35" fontSize="5" fill="#ef4444" fontWeight="bold" textAnchor="end">Cuña A. ({cunaForefootText}) →</text>}
                    {rx.alzaTalon && rx.alzaTalon.pie === "derecho" && (
                      <text x="50" y="180" textAnchor="middle" fontSize="6" fill="#b45309" fontWeight="bold">Alza +{rx.alzaTalon.valor} mm</text>
                    )}
                    <text x="90" y="197" textAnchor="end" fontSize="4" fill="var(--text-muted)" opacity="0.6">Scale 20mm</text>
                  </svg>
                </div>
              </div>
            </div>

            <div className="diagram-card">
              <h4>Vistas Laterales (Perfiles Mediales)</h4>
              <div className="diagrams-dual-row">
                <div className="diagram-side-box">
                  <h5>Pie Izquierdo</h5>
                  <svg viewBox="0 0 200 100" className="insole-svg-wide">
                    {renderInsoleSide(true)}
                    <text x="185" y="82" fontSize="7" fontWeight="bold">PUNTA</text>
                    <text x="15" y="82" textAnchor="start" fontSize="7" fontWeight="bold">TALÓN</text>
                    <text x="100" y={archPeakY} textAnchor="middle" fontSize="6" fill="var(--accent)" fontWeight="bold">{archText}</text>
                    {rx.alzaTalon && rx.alzaTalon.pie === "izquierdo" && (
                      <text x="45" y="93" textAnchor="start" fontSize="6.5" fill="#b45309" fontWeight="bold">Alza de talón +{rx.alzaTalon.valor} mm</text>
                    )}
                    <text x="175" y="20" textAnchor="end" fontSize="5.5" fill="var(--text-muted)" opacity="0.6">Scale 20mm</text>
                  </svg>
                </div>
                <div className="diagram-side-box">
                  <h5>Pie Derecho</h5>
                  <svg viewBox="0 0 200 100" className="insole-svg-wide">
                    {renderInsoleSide(false)}
                    <text x="15" y="82" fontSize="7" fontWeight="bold">PUNTA</text>
                    <text x="185" y="82" textAnchor="end" fontSize="7" fontWeight="bold">TALÓN</text>
                    <text x="100" y={archPeakY} textAnchor="middle" fontSize="6" fill="var(--accent)" fontWeight="bold">{archText}</text>
                    {rx.alzaTalon && rx.alzaTalon.pie === "derecho" && (
                      <text x="155" y="93" textAnchor="end" fontSize="6.5" fill="#b45309" fontWeight="bold">Alza de talón +{rx.alzaTalon.valor} mm</text>
                    )}
                    <text x="25" y="20" textAnchor="start" fontSize="5.5" fill="var(--text-muted)" opacity="0.6">Scale 20mm</text>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── MAIN APP COMPONENT ──
      const REGISTRY_KEY = "plantillas_registry_local";

      function loadRegistry() {
        try {
          return JSON.parse(localStorage.getItem(REGISTRY_KEY) || "[]");
        } catch {
          return [];
        }
      }

      function saveRegistry(entries) {
        try {
          localStorage.setItem(REGISTRY_KEY, JSON.stringify(entries));
        } catch (e) {
          console.error("Error saving registry to localStorage", e);
        }
      }

      function newId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }

      function App() {
        const [tab, setTab] = useState("nueva");
        const [form, setForm] = useState({
          paciente: "",
          talla: "",
          edad: "",
          grado: GRADES.LEVE,
          sintomas: true,
          flexible: true,
          barraRetrocapital: false,
          dismetriaActiva: false,
          dismetriaPie: "izquierdo",
          dismetriaValor: "5",
          especialista: localStorage.getItem("especialista_nombre") || "Dr. Bruno Hazleby Soto",
          especialidad: localStorage.getItem("especialista_especialidad") || "Traumatología y Ortopedia Infantil",
          especialistaRut: localStorage.getItem("especialista_rut") || "17.618.006-4",
          observaciones: "",
        });
        const [result, setResult] = useState(null);
        const [error, setError] = useState("");
        const [registry, setRegistry] = useState(loadRegistry);
        const [savedMsg, setSavedMsg] = useState("");

        useEffect(() => {
          saveRegistry(registry);
        }, [registry]);

        function handleChange(e) {
          const { name, value, type, checked } = e.target;
          setForm((f) => {
            const updated = { ...f, [name]: type === "checkbox" ? checked : value };
            if (name === "especialista") {
              localStorage.setItem("especialista_nombre", value);
            }
            if (name === "especialidad") {
              localStorage.setItem("especialista_especialidad", value);
            }
            if (name === "especialistaRut") {
              localStorage.setItem("especialista_rut", value);
            }
            return updated;
          });
          setResult(null);
          setError("");
          setSavedMsg("");
        }

        function handleCalcular(e) {
          e.preventDefault();
          const talla = parseInt(form.talla);
          const edad = parseInt(form.edad);
          if (!talla || talla < 10 || talla > 52) {
            setError("Ingresa una talla válida (10-52 EU).");
            return;
          }
          if (!edad || edad < 1 || edad > 110) {
            setError("Ingresa una edad válida.");
            return;
          }
          const rx = generatePrescription({
            talla,
            edad,
            grado: form.grado,
            sintomas: form.sintomas,
            flexible: form.flexible,
            barraRetrocapital: form.barraRetrocapital,
            dismetriaActiva: form.dismetriaActiva,
            dismetriaPie: form.dismetriaPie,
            dismetriaValor: parseInt(form.dismetriaValor) || 0,
          });
          if (rx.error) {
            setError(rx.error);
            setResult(null);
            return;
          }
          const hoy = new Date();
          let meses = 3;
          if (rx.controles) {
            const ctrl = rx.controles.toLowerCase();
            if (ctrl.includes("anual")) {
              meses = 12;
            } else if (ctrl.includes("6 meses")) {
              meses = 6;
            } else if (ctrl.includes("3 meses")) {
              meses = 3;
            }
          }
          const controlDate = new Date(hoy.getFullYear(), hoy.getMonth() + meses, hoy.getDate());
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          rx.fechaControl = controlDate.toLocaleDateString("es-CL", options);
          setResult(rx);
          setError("");
        }

        function handleGuardar() {
          if (!result || !result.indicacion) return;
          const entry = {
            id: newId(),
            fecha: new Date().toLocaleDateString("es-CL"),
            paciente: form.paciente || "Sin nombre",
            talla: form.talla,
            edad: form.edad,
            grado: form.grado,
            sintomas: form.sintomas,
            flexible: form.flexible,
            barraRetrocapital: form.barraRetrocapital,
            dismetriaActiva: form.dismetriaActiva,
            dismetriaPie: form.dismetriaPie,
            dismetriaValor: form.dismetriaValor,
            especialista: form.especialista,
            especialidad: form.especialidad,
            especialistaRut: form.especialistaRut,
            observaciones: form.observaciones,
            prescripcion: result,
          };
          setRegistry((r) => [entry, ...r]);
          setSavedMsg("Guardado en el registro.");
        }

        function handleEliminar(id) {
          if (!confirm("¿Deseas eliminar este registro?")) return;
          setRegistry((r) => r.filter((e) => e.id !== id));
        }

        const gradeLabel = { leve: "Leve (I)", moderado: "Moderado (II)", severo: "Severo (III)" };

        return (
          <div className="app">
            <header>
              <h1>Calculadora de Plantillas — Pie Plano</h1>
              <p className="subtitle">Prescripción basada en evidencia clínica y biomecánica</p>
              <nav>
                <button className={tab === "nueva" ? "active" : ""} onClick={() => setTab("nueva")}>
                  Nueva Prescripción
                </button>
                <button className={tab === "registro" ? "active" : ""} onClick={() => setTab("registro")}>
                  Registro ({registry.length})
                </button>
                <button className={tab === "guia" ? "active" : ""} onClick={() => setTab("guia")}>
                  Guía Clínica
                </button>
                <button className={tab === "padres" ? "active" : ""} onClick={() => setTab("padres")}>
                  Para Padres
                </button>
              </nav>
            </header>

            {tab === "nueva" && (
              <main className="main-grid">
                <section className="form-section">
                  <h2>Datos del Paciente</h2>
                  <form onSubmit={handleCalcular}>
                    <label>
                      Nombre del Paciente (opcional)
                      <input
                        name="paciente"
                        value={form.paciente}
                        onChange={handleChange}
                        placeholder="Nombre o código"
                      />
                    </label>

                    <label>
                      Talla del Calzado (EU) *
                      <input
                        name="talla"
                        type="number"
                        value={form.talla}
                        onChange={handleChange}
                        min="10"
                        max="52"
                        placeholder="Ej: 36"
                        required
                      />
                    </label>

                    <label>
                      Edad (años) *
                      <input
                        name="edad"
                        type="number"
                        value={form.edad}
                        onChange={handleChange}
                        min="1"
                        max="110"
                        placeholder="Ej: 8"
                        required
                      />
                    </label>

                    <label>
                      Grado de Pie Plano *
                      <select name="grado" value={form.grado} onChange={handleChange}>
                        <option value={GRADES.LEVE}>Leve (I) — Huella con leve contacto medial</option>
                        <option value={GRADES.MODERADO}>Moderado (II) — Colapso del arco visible</option>
                        <option value={GRADES.SEVERO}>Severo (III) — Colapso total, talón valgo marcado</option>
                      </select>
                    </label>

                    <fieldset>
                      <legend>Características Clínicas</legend>
                      <label className="checkbox-label">
                        <input
                          type="checkbox"
                          name="sintomas"
                          checked={form.sintomas}
                          onChange={handleChange}
                        />
                        Presenta síntomas (dolor, fatiga, cansancio)
                      </label>
                      <label className="checkbox-label">
                        <input
                          type="checkbox"
                          name="flexible"
                          checked={form.flexible}
                          onChange={handleChange}
                        />
                        Pie plano flexible (arco aparece en puntillas)
                      </label>
                      <label className="checkbox-label">
                        <input
                          type="checkbox"
                          name="barraRetrocapital"
                          checked={form.barraRetrocapital}
                          onChange={handleChange}
                        />
                        Incluir barra retrocapital (descarga metatarsal)
                      </label>
                    </fieldset>

                    <fieldset>
                      <legend>Dismetria (Longitud de piernas)</legend>
                      <label className="checkbox-label">
                        <input
                          type="checkbox"
                          name="dismetriaActiva"
                          checked={form.dismetriaActiva}
                          onChange={handleChange}
                        />
                        ¿Presenta discrepancia de longitud de piernas?
                      </label>
                      {form.dismetriaActiva && (
                        <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.5rem" }}>
                          <label style={{ flex: 1, marginBottom: 0 }}>
                            Pie más corto
                            <select name="dismetriaPie" value={form.dismetriaPie} onChange={handleChange}>
                              <option value="izquierdo">Izquierdo</option>
                              <option value="derecho">Derecho</option>
                            </select>
                          </label>
                          <label style={{ flex: 1, marginBottom: 0 }}>
                            Acortamiento (mm)
                            <input
                              name="dismetriaValor"
                              type="number"
                              min="2"
                              max="30"
                              value={form.dismetriaValor}
                              onChange={handleChange}
                              required
                            />
                          </label>
                        </div>
                      )}
                    </fieldset>

                    <fieldset>
                      <legend>Datos del Especialista</legend>
                      <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.5rem" }}>
                        <label style={{ flex: 2, marginBottom: 0 }}>
                          Nombre del Especialista
                          <input
                            name="especialista"
                            value={form.especialista}
                            onChange={handleChange}
                            placeholder="Ej: Dr. Juan Pérez"
                          />
                        </label>
                        <label style={{ flex: 2, marginBottom: 0 }}>
                          Especialidad
                          <input
                            name="especialidad"
                            value={form.especialidad}
                            onChange={handleChange}
                            placeholder="Ej: Ortopedia Infantil"
                          />
                        </label>
                        <label style={{ flex: 1, marginBottom: 0 }}>
                          RUT
                          <input
                            name="especialistaRut"
                            value={form.especialistaRut}
                            onChange={handleChange}
                            placeholder="Ej: 17.618.006-4"
                          />
                        </label>
                      </div>
                    </fieldset>

                    <fieldset>
                      <legend>Observaciones Clínicas</legend>
                      <label style={{ marginBottom: 0 }}>
                        Indicaciones adicionales (se imprimirán en la receta)
                        <textarea
                          name="observaciones"
                          value={form.observaciones}
                          onChange={handleChange}
                          placeholder="Ej: Usar con calzado deportivo firme, realizar elongaciones diarias, etc."
                          rows="3"
                          style={{ width: "100%", marginTop: "0.25rem", fontFamily: "inherit", padding: "0.5rem", borderRadius: "4px", border: "1px solid var(--border-color)", background: "var(--bg-card)", color: "var(--text-main)", resize: "vertical" }}
                        />
                      </label>
                    </fieldset>

                    {error && <p className="error">{error}</p>}

                    <button type="submit" className="btn-primary">
                      Generar Prescripción
                    </button>
                  </form>
                </section>

                {result && (
                  <section className="result-section">
                    {!result.indicacion ? (
                      <div className="no-indicacion">
                        <h2>Sin indicación de plantilla</h2>
                        <p className="mensaje">{result.mensaje}</p>
                        <ul>
                          {result.recomendaciones && result.recomendaciones.map((r, i) => (
                            <li key={i}>{r}</li>
                          ))}
                        </ul>
                      </div>
                    ) : (
                      <>
                        <div className="rx-header">
                          <h2>Prescripción de Plantilla</h2>
                          <div className="rx-meta">
                            {form.paciente && <span>{form.paciente}</span>}
                            <span>Talla {form.talla} EU</span>
                            <span>{form.edad} años</span>
                            <span className={"badge badge-" + form.grado}>{gradeLabel[form.grado]}</span>
                          </div>
                        </div>

                        <div className="rx-grid">
                          <RxItem label="Tipo de Ortesis" value={result.tipo} highlight={true} />
                          <RxItem label="Soporte de Arco" value={result.arcoSoporte} />
                          <RxItem label="Cuña Retropié" value={result.cunaRearfoot} />
                          <RxItem label="Cuña Antepié" value={result.cunaForefoot} />
                          <RxItem label="Flanco Medial" value={result.flandeMedal} />
                          <RxItem label="Barra Retrocapital" value={result.padMetatarsal ? "4 mm" : "No"} />
                          <RxItem label="Material" value={result.material} className="print-hide" />
                          <RxItem label="Longitud" value={result.longitud} className="print-hide" />
                          <RxItem label="Controles" value={result.controles} className="print-hide" />
                        </div>

                        {form.observaciones && (
                          <div className="print-observaciones" style={{ marginTop: "1rem", borderLeft: "4px solid var(--accent)", paddingLeft: "1rem" }}>
                            <strong>Indicaciones del Especialista:</strong>
                            <p style={{ whiteSpace: "pre-wrap", fontSize: "0.95rem", margin: "0.25rem 0 0 0" }}>{form.observaciones}</p>
                          </div>
                        )}

                        {result.notes && result.notes.length > 0 && (
                          <div className="notas">
                            <h3>Notas Clínicas</h3>
                            <ul>
                              {result.notes.map((n, i) => (
                                <li key={i}>{n}</li>
                              ))}
                            </ul>
                          </div>
                        )}

                        {result.fundamentacion && result.fundamentacion.length > 0 && (
                          <details className="fundamentacion">
                            <summary>Fundamentación Bibliográfica</summary>
                            <ul>
                              {result.fundamentacion.map((f, i) => (
                                <li key={i}>{f}</li>
                              ))}
                            </ul>
                          </details>
                        )}

                        <InsoleDiagram rx={result} />

                        <div className="print-only signature-block">
                          <div className="signature-line">____________________________________</div>
                          <div>{form.especialista || "[Nombre del Especialista]"}</div>
                          <div>{form.especialidad || "[Especialidad]"}</div>
                          {form.especialistaRut && <div>RUT: {form.especialistaRut}</div>}
                          <div style={{ marginTop: "0.25rem" }}>Próximo Control Sugerido: <strong>{result.fechaControl}</strong></div>
                        </div>
                        <div className="rx-actions">
                          <button className="btn-save" onClick={handleGuardar}>
                            Guardar en Registro
                          </button>
                          <button className="btn-print" onClick={() => window.print()}>
                            🖨️ Imprimir Receta
                          </button>
                          {savedMsg && <span className="saved-msg">{savedMsg}</span>}
                        </div>

                        {/* PÁGINA 2 PARA IMPRESIÓN (Guía para Padres) */}
                        <div className="print-page-2">
                          <div className="print-header">
                            <h2>Guía de Uso y Seguimiento Clínico para Padres</h2>
                            <p>Paciente: {form.paciente || "Sin nombre"} · Fecha: {new Date().toLocaleDateString("es-CL")}</p>
                            {form.especialista && (
                              <p style={{ marginTop: "0.25rem", fontWeight: "bold" }}>
                                Especialista: {form.especialista} {form.especialidad ? `· ${form.especialidad}` : ""} {form.especialistaRut ? `· RUT: ${form.especialistaRut}` : ""}
                              </p>
                            )}
                          </div>

                          <div className="print-card">
                            <h3>5. Instructivo de Adaptación Gradual y Uso</h3>
                            <p>Para asegurar una adaptación adecuada y evitar molestias, siga este esquema:</p>
                            <ul style={{ paddingLeft: "1.2rem", margin: "0.5rem 0" }}>
                              <li><strong>Día 1:</strong> Usar durante 1 a 2 horas únicamente.</li>
                              <li><strong>Día 2:</strong> Usar durante 2 a 3 horas.</li>
                              <li><strong>Día 3:</strong> Usar de 4 a 5 horas.</li>
                              <li><strong>Día 4 en adelante:</strong> Uso a tiempo completo si no hay molestias.</li>
                            </ul>
                            <p style={{ marginTop: "0.5rem" }}>
                              <strong>Calzado adecuado:</strong> El zapato debe ser firme en el talón (contrafuerte estable), ancho en la parte delantera para no aprisionar los dedos, y de preferencia contar con plantilla extraíble.
                            </p>
                            <p style={{ marginTop: "0.5rem" }}>
                              <strong>Mantenimiento e higiene:</strong> Limpiar con un paño húmedo y jabón suave. No sumergir en agua ni secar al sol directo o con calor artificial (radiadores o secadores), ya que deforma los materiales ortésicos (EVA/Polipropileno).
                            </p>
                          </div>

                          <div className="print-card" style={{ marginTop: "1.5rem" }}>
                            <h3>6. Cronograma de Controles y Cuándo Reconsultar</h3>
                            <p><strong>Calendario de Revisiones:</strong></p>
                            <ul style={{ paddingLeft: "1.2rem", margin: "0.5rem 0" }}>
                              <li><strong>Control Inicial (3 Meses):</strong> Programar para la fecha estimada: <strong>{result.fechaControl}</strong>. Este control evalúa la tolerancia del niño, adaptación del material y la marcha.</li>
                              <li><strong>Controles Anuales Posteriores:</strong> Cada 1 año para evaluar crecimiento, cambio de talla y evolución clínica del arco.</li>
                            </ul>
                            <p style={{ marginTop: "0.5rem" }}>
                              <strong>Signos de alarma (Reconsulta inmediata):</strong>
                            </p>
                            <ul style={{ paddingLeft: "1.2rem", margin: "0.5rem 0" }}>
                              <li>Presencia de enrojecimiento continuo de la piel, dolor localizado persistente o ampollas en la zona del arco medial.</li>
                              <li>Dolor que no desaparece tras las primeras 2 semanas de uso gradual.</li>
                            </ul>
                          </div>
                          <div className="print-only signature-block" style={{ marginTop: "2rem" }}>
                            <div className="signature-line">____________________________________</div>
                            <div>{form.especialista || "[Nombre del Especialista]"}</div>
                            <div>{form.especialidad || "[Especialidad]"}</div>
                            {form.especialistaRut && <div>RUT: {form.especialistaRut}</div>}
                          </div>
                        </div>
                      </>
                    )}
                  </section>
                )}
              </main>
            )}

            {tab === "registro" && (
              <main className="registro-section">
                <h2>Registro de Prescripciones</h2>
                {registry.length === 0 ? (
                  <p className="empty">No hay prescripciones guardadas.</p>
                ) : (
                  <div className="registro-list">
                    {registry.map((entry) => (
                      <div key={entry.id} className="registro-card">
                        <div className="reg-header">
                          <span className="reg-paciente">{entry.paciente}</span>
                          <span className="reg-fecha">{entry.fecha}</span>
                          <span className={"badge badge-" + entry.grado}>{gradeLabel[entry.grado]}</span>
                          <button className="btn-delete" onClick={() => handleEliminar(entry.id)}>
                            ✕
                          </button>
                        </div>
                        <div className="reg-details">
                          <span>Talla {entry.talla} EU</span>
                          <span>{entry.edad} años</span>
                          <span>{entry.flexible ? "Flexible" : "Rígido"}</span>
                          <span>{entry.sintomas ? "Sintomático" : "Asintomático"}</span>
                        </div>
                        <div className="reg-tipo">{entry.prescripcion.tipo || entry.prescripcion.mensaje}</div>
                        <details className="reg-full">
                          <summary>Ver prescripción completa</summary>
                          <div className="rx-grid compact">
                            {entry.prescripcion.indicacion && (
                              <>
                                <RxItem label="Tipo" value={entry.prescripcion.tipo} />
                                <RxItem label="Soporte Arco" value={entry.prescripcion.arcoSoporte} />
                                <RxItem label="Copa Talón" value={entry.prescripcion.taconeraAltura} />
                                <RxItem label="Cuña Retropié" value={entry.prescripcion.cunaRearfoot} />
                                <RxItem label="Cuña Antepié" value={entry.prescripcion.cunaForefoot} />
                                <RxItem label="Material" value={entry.prescripcion.material} />
                                <RxItem label="Controles" value={entry.prescripcion.controles} />
                              </>
                            )}
                            {entry.prescripcion.notas && entry.prescripcion.notas.map((n, i) => (
                              <p key={i} className="nota-small">{n}</p>
                            ))}
                          </div>
                        </details>
                      </div>
                    ))}
                  </div>
                )}
              </main>
            )}

            {tab === "guia" && <GuiaClinica />}
            {tab === "padres" && <SeccionPadres />}

            <footer>
              <p>
                Basado en: Delphi Consensus (PMC4282733) · PTTD Staging (ProLab Orthotics) · Decision Tree (PMC9566258) · Pediatric Study (PMC9561439)
                <br />
                Herramienta de apoyo clínico — no reemplaza la evaluación médica profesional.
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
